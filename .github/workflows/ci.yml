name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test:quality
      - run: pnpm format:check

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:unit

  integration-tests:
    runs-on: ubuntu-latest
    needs: [lint-typecheck, unit-tests]
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_CI }}
      VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY_CI }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Reconstruct .env.local
        run: |
          cat > .env.local <<EOF
          SUPABASE_DB_URL=$SUPABASE_DB_URL
          NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL
          NEXT_PUBLIC_SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY
          SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY
          ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY
          VOYAGE_API_KEY=$VOYAGE_API_KEY
          EOF
      - run: pnpm migrate
      - name: Run integration tests (sequential, rate-limit safe)
        run: pnpm test:integration
        env:
          # Voyage free tier is 3 RPM. Vitest's singleFork already serializes,
          # but if rate limits become a problem in CI, we may need to add a
          # paid key or space out the calls. For now, watch for HTTP 429s.
          VITEST_MAX_WORKERS: 1
